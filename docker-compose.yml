version: '3.8'

services:
  composer:
    build:
      context: ./services/composer
      dockerfile: Dockerfile
    ports:
      - "8080:8080"    # Render port
      - "9000:9000"    # Admin port
    environment:
      - RUST_LOG=info
    depends_on:
      - wiremock
    networks:
      - protopipe

  wiremock:
    image: wiremock/wiremock:3.0.1
    ports:
      - "8081:8080"
    volumes:
      - ./tests/mocks/wiremock:/home/wiremock
    networks:
      - protopipe

networks:
  protopipe:
    driver: bridge
