version: '3.8'

services:
  composer:
    build:
      context: ./services/composer
      dockerfile: Dockerfile
    ports:
      - "8080:8080"    # Render port
      - "9000:9000"    # Admin port
    environment:
      - RUST_LOG=info
    depends_on:
      - wiremock
    networks:
      - protopipe

  wiremock:
    image: wiremock/wiremock:latest
    ports:
      - "8081:8080"
    volumes:
      - ./tests/mocks/wiremock:/home/wiremock
    networks:
      - protopipe

  benchmark:
    user: root
    image: grafana/k6:latest
    working_dir: /scripts/k6
    volumes:
      - ./services/composer/bench:/scripts:Z
      - ./services/composer/target/bench:/output:Z
    environment:
      - K6_VUS=${K6_VUS:-5}
      - K6_DURATION=${K6_DURATION:-15s}
      - K6_HOST=composer
    entrypoint: ["/bin/sh", "-c"]
    command: '"k6 run --summary-export=/output/k6-summary.json --out json=/output/k6-results.json benchmark.js"'
    stdin_open: true
    tty: true
    depends_on:
      - composer
    networks:
      - protopipe
    profiles:
      - benchmark

networks:
  protopipe:
    driver: bridge
