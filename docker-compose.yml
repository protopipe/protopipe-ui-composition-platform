version: '3.8'

services:
  composer:
    build:
      context: ./services/composer
      dockerfile: Dockerfile
    ports:
      - "8080:8080"    # Render port
      - "9000:9000"    # Admin port
    environment:
      - RUST_LOG=info
    depends_on:
      - wiremock
    networks:
      - protopipe

  wiremock:
    image: wiremock/wiremock:latest
    ports:
      - "8081:8080"
    volumes:
      - ./tests/mocks/wiremock:/home/wiremock
    networks:
      - protopipe

  benchmark:
    image: grafana/k6:latest
    volumes:
      - ./services/composer/bench:/scripts
      - ./services/composer/target/bench:/output
    environment:
      - K6_VUS=${K6_VUS:-5}
      - K6_DURATION=${K6_DURATION:-15s}
    entrypoint: ["k6", "run", "--summary-export=/output/k6-summary.json", "--out", "json=/output/k6-results.json", "/scripts/k6/benchmark.js"]
    depends_on:
      - composer
    networks:
      - protopipe
    profiles:
      - benchmark

networks:
  protopipe:
    driver: bridge
