name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest 
      
    container:
      image: rust:1.95 

    steps:
      - uses: actions/checkout@v4

      - name: Build
        working-directory: services/composer
        run: cargo build --release

      - name: Create archive
        run: |
          mkdir dist
          cp services/composer/target/release/protopipe-composer dist/
          tar -czf protopipe-composer-linux-x86_64.tar.gz -C dist protopipe-composer

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/protopipe-composer-linux-x86_64.tar.gz