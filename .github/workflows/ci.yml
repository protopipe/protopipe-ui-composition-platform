name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compose-validation:
    name: Compose validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Podman Compose runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y podman python3-pip
          python3 -m pip install --user podman-compose==1.5.0
          echo "$(python3 -m site --user-base)/bin" >> "$GITHUB_PATH"
          podman version
          "$(python3 -m site --user-base)/bin/podman-compose" version

      - name: Build and run BDD profile
        run: podman-compose -f compose.yaml --profile ci up --build --abort-on-container-exit --exit-code-from test-bdd

      - name: Clean up
        if: always()
        run: podman-compose -f compose.yaml --profile ci down --volumes --remove-orphans

  load-smoke:
    name: k6 smoke load test
    runs-on: ubuntu-latest
    needs: compose-validation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Podman Compose runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y podman python3-pip
          python3 -m pip install --user podman-compose==1.5.0
          echo "$(python3 -m site --user-base)/bin" >> "$GITHUB_PATH"
          podman version
          "$(python3 -m site --user-base)/bin/podman-compose" version

      - name: Run k6 smoke profile
        run: podman-compose -f compose.yaml --profile load up --build --abort-on-container-exit --exit-code-from test-load

      - name: Clean up
        if: always()
        run: podman-compose -f compose.yaml --profile load down --volumes --remove-orphans
