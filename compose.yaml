name: protopipe-ui-composition-platform

x-composer-env: &composer-env
  RUST_LOG: info

services:
  rabbitmq:
    image: docker.io/library/rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    profiles:
      - dev
      - test
      - ci

  composer:
    build:
      context: ./services/composer
      dockerfile: Dockerfile
      target: runtime
    environment:
      <<: *composer-env
    ports:
      - "8080:8080"
      - "9000:9000"
    profiles:
      - test
      - load
      - ci

  composer-dev:
    build:
      context: ./services/composer
      dockerfile: Dockerfile
      target: dev
    working_dir: /app
    volumes:
      - ./services/composer:/app:z
      - composer-target:/app/target
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
    environment:
      RUST_LOG: debug
    command:
      - bacon
      - --headless
      - run-long
    ports:
      - "8080:8080"
      - "9000:9000"
    profiles:
      - dev

  wiremock:
    image: wiremock/wiremock:3.13.2
    command:
      - --global-response-templating
      - --verbose
    ports:
      - "8081:8080"
    profiles:
      - dev
      - test
      - load
      - ci

  message-worker-mock:
    build:
      context: ./services/message-worker-mock
      dockerfile: Dockerfile
    environment:
      RUST_LOG: info
      MESSAGE_WORKER_MOCK_AMQP_URL: amqp://guest:guest@rabbitmq:5672/%2f
      MESSAGE_WORKER_MOCK_QUEUES: protopipe.commands
      MESSAGE_WORKER_MOCK_BINDINGS: "protopipe.commands:protopipe.commands:#"
    ports:
      - "9100:9100"
    depends_on:
      - rabbitmq
    profiles:
      - dev
      - test
      - ci

  messagebridge:
    build:
      context: ./services/messagebridge
      dockerfile: Dockerfile
    environment:
      RUST_LOG: info
      MESSAGEBRIDGE_AMQP_URL: amqp://guest:guest@rabbitmq:5672/%2f
    ports:
      - "8082:8082"
    depends_on:
      - rabbitmq
    profiles:
      - test
      - ci

  messagebridge-dev:
    build:
      context: ./services/messagebridge
      dockerfile: Dockerfile
      target: dev
    working_dir: /app
    volumes:
      - ./services/messagebridge:/app:z
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
    environment:
      RUST_LOG: debug
      MESSAGEBRIDGE_AMQP_URL: amqp://guest:guest@rabbitmq:5672/%2f
    command:
      - bacon
      - --headless
      - run-long
    ports:
      - "8082:8082"
    depends_on:
      - rabbitmq
    profiles:
      - dev

  bdd-dev:
    image: rust:1.95-bookworm
    working_dir: /workspace
    volumes:
      - .:/workspace:z
      - bdd-target:/workspace/tests/bdd/target
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
    environment:
      COMPOSER_BASE_URL: http://composer-dev
      COMPOSER_ADMIN_URL: http://composer-dev
      MESSAGEBRIDGE_URL: http://messagebridge-dev:8082
      MESSAGE_WORKER_MOCK_URL: http://message-worker-mock:9100
      WIREMOCK_URL: http://wiremock:8080
      CUCUMBER_FEATURES: /workspace/tests/bdd/features
      TERM: xterm-256color
    entrypoint: ["cargo", "test", "--manifest-path", "tests/bdd/Cargo.toml", "--test", "cucumber", "--", "-vvv"]
    command:
      - --tags
      - '@WIP'
    depends_on:
      - composer-dev
      - messagebridge-dev
      - message-worker-mock
      - wiremock
    profiles:
      - dev

  test-bdd:
    image: rust:1.95-bookworm
    working_dir: /workspace
    volumes:
      - .:/workspace:z
      - bdd-target:/workspace/tests/bdd/target
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
    environment:
      COMPOSER_BASE_URL: http://composer
      COMPOSER_ADMIN_URL: http://composer
      MESSAGEBRIDGE_URL: http://messagebridge:8082
      MESSAGE_WORKER_MOCK_URL: http://message-worker-mock:9100
      WIREMOCK_URL: http://wiremock:8080
      CUCUMBER_FEATURES: /workspace/tests/bdd/features
    command:
      - cargo
      - test
      - --manifest-path
      - tests/bdd/Cargo.toml
      - --test
      - cucumber
      - --
      - -vvv
      - --tags
      - not @WIP
    depends_on:
      - composer
      - messagebridge
      - message-worker-mock
      - wiremock
    profiles:
      - test
      - ci

  test-load:
    image: grafana/k6:1.0.0
    working_dir: /scripts
    volumes:
      - ./tests/load:/scripts:z
    environment:
      COMPOSER_BASE_URL: http://composer:8080
      COMPOSER_ADMIN_URL: http://composer:9000
    command:
      - run
      - /scripts/composer-smoke.js
    depends_on:
      - composer
      - wiremock
    profiles:
      - load

volumes:
  bdd-target:
  cargo-git:
  cargo-registry:
  composer-target:
